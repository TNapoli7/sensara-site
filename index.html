<body>
<!-- Loading screen — visible until React mounts -->
<div id="loader" style="position:fixed;inset:0;z-index:99999;background:#0d0d0d;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.6s ease,visibility 0.6s ease;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
    <span style="display:block;width:24px;height:24px;position:relative;">
      <span style="position:absolute;inset:0;border:1px solid #fff;"></span>
      <span style="position:absolute;inset:4px;background:#266DF1;"></span>
    </span>
    <span style="font-family:Poppins,sans-serif;font-size:20px;letter-spacing:-0.02em;color:#fff;">SENSARA</span>
  </div>
  <div style="width:120px;height:1px;background:rgba(255,255,255,0.1);border-radius:1px;overflow:hidden;">
    <div id="loader-bar" style="width:0%;height:100%;background:#266DF1;transition:width 0.3s ease;"></div>
  </div>
  <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-top:12px;">Loading</span>
</div>
<script>
(function(){
  var bar = document.getElementById('loader-bar');
  var steps = [15, 35, 55, 75, 90];
  var i = 0;
  var iv = setInterval(function(){
    if (i < steps.length) { bar.style.width = steps[i] + '%'; i++; }
  }, 400);
  window._hideLoader = function(){
    clearInterval(iv);
    bar.style.width = '100%';
    setTimeout(function(){
      var l = document.getElementById('loader');
      if (l) { l.style.opacity = '0'; l.style.visibility = 'hidden'; }
    }, 300);
  };
})();
</script>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="sensara/components.jsx"></script>
<script type="text/babel" data-presets="react" src="sensara/sections.jsx"></script>
<script type="text/babel" data-presets="react" src="sensara/globe.jsx"></script>
<script type="text/babel" data-presets="react" src="sensara/app.jsx"></script>
</body>
